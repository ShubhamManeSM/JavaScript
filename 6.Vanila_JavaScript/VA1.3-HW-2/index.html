<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanila JS</title>
  </head>
  <body>
    <label for="bookTextarea">Enter your book review:</label>
    <textarea id="bookTextarea" rows="4" cols="50"></textarea>
    <button id="displayBookBtn">Display Book Review</button>
    <p id="bookResult"></p>

    <label for="bioTextarea">Enter your personal bio:</label>
    <textarea id="bioTextarea" rows="4" cols="50"></textarea>
    <button id="displayBioBtn">Display Styled Bio</button>
    <p id="bioResult"></p>

    <label for="diaryTextarea">Enter your personal diary entry:</label>
    <textarea id="diaryTextarea" rows="4" cols="50"></textarea>
    <button id="displayDiaryBtn">Display Diary Entry</button>
    <p id="diaryResult"></p>

    <script>
      const bookTextarea = document.getElementById("bookTextarea")
      const displayBookBtn = document.getElementById("displayBookBtn")
      const bookResult = document.getElementById("bookResult")

      displayBookBtn.addEventListener("click",function(){
        const bookReview = bookTextarea.value
        bookResult.textContent = `Your book review: ${bookReview}` 
      })


      const bioTextarea = document.getElementById("bioTextarea")
      const displayBioBtn = document.getElementById("displayBioBtn")
      const bioResult = document.getElementById("bioResult")

      displayBioBtn.addEventListener("click",function(){
        const bio = bioTextarea.value
        bioResult.innerHTML = "<em>"  + bio + "</em>" 
      })

      const diaryTextarea = document.getElementById("diaryTextarea")
      const displayDiaryBtn = document.getElementById("displayDiaryBtn")
      const diaryResult = document.getElementById("diaryResult")

      displayDiaryBtn.addEventListener("click",function(){
        const diary = diaryTextarea.value
        const date = new Date();
        const dateTime = date.toLocaleString();
        diaryResult.innerHTML = "<strong>" + dateTime + "</strong>" + "<p>" + diary + "</p>"
      })
    </script>
  </body>
</html>
